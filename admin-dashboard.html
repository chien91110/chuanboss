<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>川收 ChuanPOS｜管理員後台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Space+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --black: #0a0a0a; --white: #fff; --gray-50: #f8f8f6; --gray-100: #f0efec;
  --gray-200: #e2e0da; --gray-400: #9c9890; --gray-600: #5a5750;
  --accent: #c17f3e; --accent-light: #e8c99a; --green: #3d7a5c; --red: #c0392b;
  --orange: #e67e22;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--gray-50); color: var(--black); min-height: 100vh; }

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 52px; background: var(--black);
  display: flex; align-items: center; padding: 0 20px; gap: 12px;
}
.nav-logo { color: white; font-weight: 700; font-size: 15px; }
.nav-logo span { color: var(--accent-light); }
.nav-admin-badge { font-size: 11px; background: var(--red); color: white; padding: 2px 8px; border-radius: 100px; font-weight: 700; }
.nav-spacer { flex: 1; }
.nav-user { font-size: 12px; color: rgba(255,255,255,0.45); }
.btn-logout { font-size: 12px; color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.15); background: none; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; transition: all 0.15s; }
.btn-logout:hover { color: white; border-color: rgba(255,255,255,0.4); }

/* MAIN */
main { padding: 68px 20px 40px; max-width: 1200px; margin: 0 auto; }

/* STATS ROW */
.stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 24px; }
.stat-card { background: var(--white); border-radius: 14px; padding: 16px 20px; border: 1.5px solid var(--gray-200); }
.stat-label { font-size: 11px; color: var(--gray-400); font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 6px; }
.stat-val { font-size: 28px; font-weight: 700; font-family: 'Space Mono', monospace; }
.stat-val.green { color: var(--green); }
.stat-val.orange { color: var(--orange); }
.stat-val.red { color: var(--red); }
.stat-val.accent { color: var(--accent); }

/* FILTER */
.filter-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
.filter-input { padding: 8px 12px; border: 1.5px solid var(--gray-200); border-radius: 8px; font-size: 13px; font-family: 'Noto Sans TC', sans-serif; outline: none; }
.filter-input:focus { border-color: var(--accent); }
.filter-select { padding: 8px 12px; border: 1.5px solid var(--gray-200); border-radius: 8px; font-size: 13px; font-family: 'Noto Sans TC', sans-serif; outline: none; background: var(--white); cursor: pointer; }
.filter-label { font-size: 12px; color: var(--gray-400); }
.btn-refresh { padding: 8px 14px; background: var(--black); color: white; border: none; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; transition: all 0.15s; }
.btn-refresh:hover { background: #333; }

/* TABLE */
.table-wrap { background: var(--white); border-radius: 16px; border: 1.5px solid var(--gray-200); overflow: hidden; }
.table-header { padding: 14px 20px; border-bottom: 1px solid var(--gray-200); display: flex; justify-content: space-between; align-items: center; }
.table-title { font-size: 14px; font-weight: 700; }
.table-count { font-size: 12px; color: var(--gray-400); }
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th { background: var(--gray-50); padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--gray-200); color: var(--gray-600); font-size: 11px; font-weight: 700; letter-spacing: 0.05em; white-space: nowrap; }
.data-table td { padding: 12px 14px; border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--gray-50); }

/* 狀態標籤 */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 100px; font-size: 11px; font-weight: 700; white-space: nowrap; }
.badge-active { background: #e8f5ee; color: var(--green); }
.badge-warning { background: #fff8e6; color: var(--orange); }
.badge-frozen { background: #fdecea; color: var(--red); }
.badge-basic { background: var(--gray-100); color: var(--gray-600); }
.badge-advanced { background: #e8f0fe; color: #1a73e8; }
.badge-premium { background: #fdf6ec; color: var(--accent); }

/* 進度條 */
.progress-mini { height: 4px; background: var(--gray-100); border-radius: 100px; width: 80px; overflow: hidden; }
.progress-mini-fill { height: 100%; border-radius: 100px; transition: width 0.3s; }

/* 操作按鈕 */
.action-row { display: flex; gap: 6px; flex-wrap: wrap; }
.btn-action { padding: 5px 10px; border: 1.5px solid var(--gray-200); border-radius: 6px; background: none; font-size: 11px; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; transition: all 0.15s; white-space: nowrap; }
.btn-action:hover { border-color: var(--accent); color: var(--accent); }
.btn-action.danger:hover { border-color: var(--red); color: var(--red); }
.btn-action.success:hover { border-color: var(--green); color: var(--green); }

/* EMAIL 按鈕 */
.btn-send-email { padding: 5px 10px; border: 1.5px solid var(--gray-200); border-radius: 6px; background: none; font-size: 11px; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; transition: all 0.15s; }
.btn-send-email:hover { border-color: #1a73e8; color: #1a73e8; }
.btn-send-email:disabled { opacity: 0.4; cursor: not-allowed; }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.show { display: flex; }
.modal-box { background: var(--white); border-radius: 20px; padding: 28px; width: 100%; max-width: 420px; }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
.modal-sub { font-size: 13px; color: var(--gray-400); margin-bottom: 20px; }
.modal-form-row { margin-bottom: 14px; }
.modal-label { display: block; font-size: 12px; font-weight: 600; color: var(--gray-600); margin-bottom: 6px; }
.modal-input, .modal-select { width: 100%; padding: 10px 12px; border: 1.5px solid var(--gray-200); border-radius: 10px; font-size: 14px; font-family: 'Noto Sans TC', sans-serif; outline: none; background: var(--white); }
.modal-input:focus, .modal-select:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.btn-cancel { flex: 1; padding: 11px; background: var(--gray-100); border: none; border-radius: 10px; font-size: 14px; font-family: 'Noto Sans TC', sans-serif; cursor: pointer; }
.btn-confirm { flex: 2; padding: 11px; background: var(--black); color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; font-family: 'Noto Sans TC', sans-serif; cursor: pointer; }

/* SPINNER / TOAST */
.full-spinner { position: fixed; inset: 0; background: var(--gray-50); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; z-index: 500; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--gray-200); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--black); color: white; padding: 10px 20px; border-radius: 100px; font-size: 13px; z-index: 600; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }

/* RWD */
@media (max-width: 900px) {
  .stats-row { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 600px) {
  .stats-row { grid-template-columns: 1fr 1fr; }
  .data-table th:nth-child(5), .data-table td:nth-child(5),
  .data-table th:nth-child(6), .data-table td:nth-child(6) { display: none; }
  main { padding: 68px 12px 40px; }
}
</style>
</head>
<body>

<script>
const SUPABASE_URL = 'https://siiicdrjpuotapdtlqsu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNpaWljZHJqcHVvdGFwZHRscXN1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzODQ5MzUsImV4cCI6MjA4ODk2MDkzNX0.TiVezXuAKuJYja2PUwbo9SLcg-de7_2vrodMsDZhg_Q';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const RESEND_API_KEY = 're_RZYgpsca_8d3MyHtMhkB2Fnv18L9CL6a7'; // 等有網域再啟用
const FROM_EMAIL = 'noreply@chuanpos.com'; // 換成你的網域

const PLAN_NAMES = { basic: '基本版', advanced: '進階版', premium: '高級版' };

let currentUser = null;
let allUsers = []; // { profile, trial }
let emailTarget = null;

async function init() {
  try {
    // 等待 Supabase session 從 localStorage 恢復
    const { data: { session } } = await sb.auth.getSession();

    if (!session) {
      // 再等一下，避免 session 還沒恢復就跳走
      await new Promise(r => setTimeout(r, 500));
      const { data: { session: session2 } } = await sb.auth.getSession();
      if (!session2) { window.location.href = 'auth.html'; return; }
      currentUser = session2.user;
    } else {
      currentUser = session.user;
    }

    // 確認是管理員
    const { data: profile } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
    if (!profile?.is_admin) {
      document.getElementById('spinner').innerHTML =
        `<div style="text-align:center;padding:40px">
          <div style="font-size:32px;margin-bottom:12px">🔒</div>
          <div style="font-weight:700;margin-bottom:8px">無存取權限</div>
          <div style="font-size:13px;color:var(--gray-400);margin-bottom:16px">此頁面僅限管理員存取</div>
          <button onclick="window.location.href='trial.html'" style="padding:10px 20px;background:var(--black);color:white;border:none;border-radius:10px;font-size:14px;cursor:pointer">返回試用中心</button>
        </div>`;
      return;
    }
    document.getElementById('nav-user').textContent = profile.email;
    await loadData();
    document.getElementById('spinner').style.display = 'none';
  } catch(e) {
    console.error(e);
    document.getElementById('spinner').innerHTML =
      `<div style="text-align:center;padding:40px">
        <div style="font-size:24px;margin-bottom:12px">⚠️</div>
        <div style="font-weight:700;margin-bottom:8px">載入失敗</div>
        <div style="font-size:13px;color:var(--gray-400);margin-bottom:16px">${e.message}</div>
        <button onclick="location.reload()" style="padding:10px 20px;background:var(--accent);color:white;border:none;border-radius:10px;font-size:14px;cursor:pointer">重新載入</button>
      </div>`;
  }
}

async function loadData() {
  // 從 profiles 出發（含沒有試用紀錄的帳號）
  const [{ data: profiles }, { data: trials }] = await Promise.all([
    sb.from('profiles').select('*').order('created_at', { ascending: false }),
    sb.from('trials').select('*').order('started_at', { ascending: false })
  ]);

  // 合併：每個 profile 找對應的 trial
  allUsers = (profiles || []).map(p => ({
    profile: p,
    trial: (trials || []).find(t => t.user_id === p.id) || null
  }));

  renderStats();
  renderTable();
  // 每次載入時自動檢查年費到期
  checkSubscriptionExpiry();
}

async function checkSubscriptionExpiry() {
  const now = new Date();
  const expiring = []; // 即將到期（14天內）
  const expired = [];  // 已到期但還沒降級

  for (const u of allUsers) {
    const p = u.profile;
    if (!p.is_paid || p.is_early_adopter || !p.subscription_expires_at) continue;

    const expiresAt = new Date(p.subscription_expires_at);
    const daysLeft = Math.ceil((expiresAt - now) / 86400000);

    // 已到期超過7天寬限期 → 自動降級（停用年費）
    if (daysLeft < -7 && p.subscription_active) {
      await sb.from('profiles').update({
        subscription_active: false
      }).eq('id', p.id);
      console.log(`年費降級：${p.email}（到期 ${daysLeft} 天前）`);
      expired.push(p.email);
    }
    // 14天內到期 → 加入提醒名單
    else if (daysLeft > 0 && daysLeft <= 14) {
      expiring.push({ ...p, daysLeft });
    }
  }

  // 顯示提醒通知
  if (expiring.length > 0) {
    const names = expiring.map(p => `${p.brand_name}（${p.daysLeft}天）`).join('、');
    showExpiringBanner(`⚠️ 以下客戶年費即將到期：${names}`);
  }
  if (expired.length > 0) {
    await loadData(); // 重新載入反映降級狀態
  }
}

function showExpiringBanner(msg) {
  let banner = document.getElementById('expiring-banner');
  if (!banner) {
    banner = document.createElement('div');
    banner.id = 'expiring-banner';
    banner.style.cssText = `
      position:fixed;top:52px;left:0;right:0;z-index:90;
      background:#fff8e6;border-bottom:1px solid #f0c040;
      padding:10px 20px;font-size:13px;color:#7a5c00;
      display:flex;justify-content:space-between;align-items:center;
    `;
    document.body.appendChild(banner);
    // main 下移
    document.querySelector('main').style.paddingTop = '110px';
  }
  banner.innerHTML = `<span>${msg}</span>
    <button onclick="this.parentElement.remove();document.querySelector('main').style.paddingTop='68px'"
      style="border:none;background:none;cursor:pointer;font-size:16px;color:#7a5c00">✕</button>`;
}

function getDaysLeft(expiresAt) {
  if (!expiresAt) return -1;
  return Math.ceil((new Date(expiresAt) - new Date()) / 86400000);
}

function getStatus(trial, profile) {
  // 正式版優先
  if (profile?.is_paid) return 'paid';
  if (!trial) return 'no-trial';
  if (trial.is_frozen) return 'frozen';
  const days = getDaysLeft(trial.expires_at);
  if (days < 0) return 'frozen';
  if (days <= 5) return 'expiring';
  return 'active';
}

function renderStats() {
  const total = allUsers.length;
  const active = allUsers.filter(u => getStatus(u.trial, u.profile) === 'active').length;
  const expiring = allUsers.filter(u => getStatus(u.trial, u.profile) === 'expiring').length;
  const frozen = allUsers.filter(u => getStatus(u.trial, u.profile) === 'frozen').length;
  const paid = allUsers.filter(u => u.profile?.is_paid).length;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-active').textContent = active;
  document.getElementById('stat-expiring').textContent = expiring;
  document.getElementById('stat-frozen').textContent = frozen;
  document.getElementById('stat-paid').textContent = paid;
}

function renderTable() {
  const search = document.getElementById('filter-search').value.toLowerCase();
  const statusFilter = document.getElementById('filter-status').value;
  const planFilter = document.getElementById('filter-plan').value;

  const filtered = allUsers.filter(u => {
    const p = u.profile;
    const t = u.trial;
    const status = getStatus(t, p);
    if (search && !p.brand_name?.toLowerCase().includes(search) && !p.email?.toLowerCase().includes(search)) return false;
    if (statusFilter && status !== statusFilter) return false;
    if (planFilter && t?.plan !== planFilter) return false;
    return true;
  });

  document.getElementById('table-count').textContent = `共 ${filtered.length} 筆`;

  const tbody = document.getElementById('table-body');
  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--gray-400)">沒有符合的用戶</td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(u => {
    const p = u.profile;
    const t = u.trial;
    const status = getStatus(t, p);

    // 狀態 badge
    const statusBadge = {
      active:    `<span class="badge badge-active">✓ 試用中</span>`,
      expiring:  `<span class="badge badge-warning">⚠ 剩 ${getDaysLeft(t?.expires_at)} 天</span>`,
      frozen:    `<span class="badge badge-frozen">🔒 已凍結</span>`,
      paid:      `<span class="badge badge-premium">✓ 正式版</span>`,
      'no-trial':`<span class="badge badge-basic">— 未試用</span>`
    }[status] || `<span class="badge badge-basic">${status}</span>`;

    // 正式版 badge
    const paidBadge = p.is_paid
      ? `<span class="badge badge-premium" style="margin-left:4px">正式 ${PLAN_NAMES[p.plan] || ''}</span>`
      : '';

    // 試用版本 badge
    const planBadge = t ? ({
      basic:    `<span class="badge badge-basic">基本</span>`,
      advanced: `<span class="badge badge-advanced">進階</span>`,
      premium:  `<span class="badge badge-premium">高級</span>`
    }[t.plan] || '') : '<span style="color:var(--gray-400);font-size:12px">—</span>';

    // 剩餘天數進度
    const daysLeft = t ? getDaysLeft(t.expires_at) : null;
    const progress = t ? Math.max(0, Math.min(100, Math.round((1 - daysLeft / 20) * 100))) : 100;
    const progressColor = !t ? 'var(--gray-200)' : daysLeft <= 3 ? 'var(--red)' : daysLeft <= 5 ? 'var(--orange)' : 'var(--green)';

    const startDate = t ? new Date(t.started_at).toLocaleDateString('zh-TW', { month:'2-digit', day:'2-digit' }) : '—';

    // 操作按鈕
    const editBtn = t
      ? `<button class="btn-action" onclick="openEditModal('${t.id}')">編輯</button>`
      : `<button class="btn-action" onclick="openEditModalByProfile('${p.id}')">設定</button>`;

    const freezeBtn = t && status !== 'frozen' && status !== 'paid'
      ? `<button class="btn-action danger" onclick="freezeUser('${t.id}', '${p.brand_name}')">凍結</button>`
      : t && status === 'frozen'
        ? `<button class="btn-action success" onclick="unfreezeUser('${t.id}', '${p.brand_name}')">解凍</button>`
        : '';

    const emailBtn = status !== 'frozen' && status !== 'paid' && t
      ? `<button class="btn-send-email" onclick="openEmailModal('${t.id}')">寄提醒</button>`
      : '';

    const deleteBtn = `<button class="btn-action danger" onclick="deleteAccount('${p.id}', '${p.email}', '${p.brand_name}')">刪除帳號</button>`;

    // 解鎖基本資料（正式版才顯示）
    const canEdit = p.profile_edit_unlocked_at &&
      (new Date() - new Date(p.profile_edit_unlocked_at)) / 86400000 <= 7;
    const unlockBtn = p.is_paid
      ? canEdit
        ? `<button class="btn-action success" onclick="unlockProfile('${p.id}', '${p.brand_name}', true)">🔓 解鎖中</button>`
        : `<button class="btn-action" onclick="unlockProfile('${p.id}', '${p.brand_name}', false)">🔑 解鎖資料</button>`
      : '';

    return `<tr>
      <td>
        <div style="font-weight:600">${p.brand_name || '—'}${p.is_admin ? ' <span style="font-size:10px;color:var(--red)">ADMIN</span>' : ''}</div>
        <div style="font-size:11px;color:var(--gray-400);margin-top:2px">${startDate} 開始</div>
      </td>
      <td style="font-size:12px;color:var(--gray-600)">${p.email}</td>
      <td>${planBadge}${paidBadge}</td>
      <td>${statusBadge}</td>
      <td>
        <div style="font-size:12px;margin-bottom:4px;font-family:'Space Mono',monospace">${daysLeft !== null && status !== 'frozen' ? daysLeft + ' 天' : '—'}</div>
        <div class="progress-mini"><div class="progress-mini-fill" style="width:${progress}%;background:${progressColor}"></div></div>
      </td>
      <td style="font-size:12px;color:var(--gray-600)">${p.city || '—'} / ${p.industry || '—'}</td>
      <td>
        <div class="action-row">
          ${editBtn}${freezeBtn}${emailBtn}${unlockBtn}${deleteBtn}
        </div>
      </td>
    </tr>`;
  }).join('');
}

// 有 trial 的帳號
function openEditModal(trialId) {
  const u = allUsers.find(u => u.trial?.id === trialId);
  if (!u) return;
  _openEditModalCore(u);
}

// 沒有 trial 的帳號（純正式版客戶）
function openEditModalByProfile(profileId) {
  const u = allUsers.find(u => u.profile.id === profileId);
  if (!u) return;
  _openEditModalCore(u);
}

function _openEditModalCore(u) {
  const p = u.profile;
  const t = u.trial;
  document.getElementById('edit-modal-sub').textContent = `${p.brand_name} · ${p.email}`;
  document.getElementById('edit-trial-id').value = t?.id || '';
  document.getElementById('edit-user-id').value = p.id;
  // 試用欄位
  document.getElementById('edit-plan').value = t?.plan || 'basic';
  document.getElementById('edit-expires').value = t?.expires_at ? new Date(t.expires_at).toISOString().slice(0, 10) : '';
  document.getElementById('edit-frozen').value = String(t?.is_frozen || false);
  // 正式版欄位
  document.getElementById('edit-paid').value = String(p.is_paid || false);
  document.getElementById('edit-paid-plan').value = p.plan || '';
  document.getElementById('edit-sub-expires').value = p.subscription_expires_at
    ? new Date(p.subscription_expires_at).toISOString().slice(0, 10) : '';
  document.getElementById('edit-early').value = String(p.is_early_adopter || false);
  // 帳號管理
  document.getElementById('edit-new-email').value = '';
  document.getElementById('edit-admin-note').value = p.admin_note || '';
  document.getElementById('modal-edit').classList.add('show');
  document.body.style.overflow = 'hidden';
}

// 年費快速設定 +1年
function setSubExpiresOneYear() {
  const current = document.getElementById('edit-sub-expires').value;
  let baseDate;
  if (current) {
    const currentDate = new Date(current);
    // 如果原到期日還沒到期，從原到期日加一年（不損失剩餘天數）
    // 如果已過期，從今天加一年
    baseDate = currentDate > new Date() ? currentDate : new Date();
  } else {
    baseDate = new Date();
  }
  baseDate.setFullYear(baseDate.getFullYear() + 1);
  document.getElementById('edit-sub-expires').value = baseDate.toISOString().slice(0, 10);
}

async function saveEdit() {
  const trialId = document.getElementById('edit-trial-id').value;
  const userId = document.getElementById('edit-user-id').value;
  const isFrozen = document.getElementById('edit-frozen').value === 'true';
  const isPaid = document.getElementById('edit-paid').value === 'true';
  const paidPlan = document.getElementById('edit-paid-plan').value || null;
  const subExpires = document.getElementById('edit-sub-expires').value;
  const isEarly = document.getElementById('edit-early').value === 'true';
  const adminNote = document.getElementById('edit-admin-note').value.trim();
  const newEmail = document.getElementById('edit-new-email').value.trim();

  const btn = document.querySelector('#modal-edit .btn-confirm');
  btn.disabled = true; btn.textContent = '儲存中...';

  try {
    // 1. 有 trial 才更新 trials 表
    if (trialId) {
      const plan = document.getElementById('edit-plan').value;
      const expiresAt = document.getElementById('edit-expires').value;
      const { error: trialErr } = await sb.from('trials').update({
        plan,
        expires_at: new Date(expiresAt + 'T23:59:59+08:00').toISOString(),
        is_frozen: isFrozen,
        frozen_at: isFrozen ? new Date().toISOString() : null
      }).eq('id', trialId);
      if (trialErr) throw new Error('試用設定失敗：' + trialErr.message);
    }

    // 2. 更新 profiles 表
    const u = allUsers.find(u => u.profile.id === userId);
    const profileUpdates = {
      is_paid: isPaid,
      plan: isPaid ? paidPlan : null,
      is_early_adopter: isEarly,
      subscription_active: isPaid && (isEarly || !!subExpires),
      subscription_expires_at: subExpires ? new Date(subExpires + 'T23:59:59+08:00').toISOString() : null,
      paid_at: isPaid && !u?.profile?.paid_at ? new Date().toISOString() : u?.profile?.paid_at || null,
      admin_note: adminNote || null
    };
    const { error: profileErr } = await sb.from('profiles').update(profileUpdates).eq('id', userId);
    if (profileErr) throw new Error('正式版設定失敗：' + profileErr.message);

    // 3. 換 Email（有填才執行）
    if (newEmail && newEmail !== u?.profile?.email) {
      // 更新 profiles 表的 email
      const { error: emailErr } = await sb.from('profiles').update({ email: newEmail }).eq('id', userId);
      if (emailErr) throw new Error('Email 更新失敗：' + emailErr.message);
      showToast(`⚠️ profiles.email 已更新，請到 Supabase Auth 手動更改登入 Email`);
    }

    closeModal();
    await loadData();
    showToast('✅ 已儲存');
  } catch(e) {
    showToast('❌ ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = '儲存';
  }
}

function closeModal() {
  document.getElementById('modal-edit').classList.remove('show');
  document.body.style.overflow = '';
}

// ── 快速凍結 / 解凍 ──
async function freezeUser(trialId, brandName) {
  if (!confirm(`確定要凍結「${brandName}」的帳號嗎？`)) return;
  const { error } = await sb.from('trials').update({
    is_frozen: true, frozen_at: new Date().toISOString()
  }).eq('id', trialId);
  if (error) { showToast('操作失敗'); return; }
  await loadData();
  showToast(`已凍結 ${brandName}`);
}

async function unfreezeUser(trialId, brandName) {
  if (!confirm(`確定要解凍「${brandName}」的帳號嗎？\n解凍後用戶可重新使用試用系統。`)) return;
  // 解凍時延長到期日為今天+7天（寬限期）
  const newExpires = new Date(Date.now() + 7 * 86400000).toISOString();
  const { error } = await sb.from('trials').update({
    is_frozen: false, frozen_at: null, expires_at: newExpires
  }).eq('id', trialId);
  if (error) { showToast('操作失敗'); return; }
  await loadData();
  showToast(`已解凍 ${brandName}，給予 7 天寬限期`);
}

// ── Email 提醒 ──
function openEmailModal(trialId) {
  const u = allUsers.find(u => u.trial.id === trialId);
  if (!u) return;
  emailTarget = u;
  const daysLeft = getDaysLeft(u.trial.expires_at);
  const expiresStr = new Date(u.trial.expires_at).toLocaleDateString('zh-TW');

  document.getElementById('email-modal-sub').textContent = `收件人：${u.profile.email}`;
  document.getElementById('email-preview').innerHTML = `
    <strong>主旨：</strong>川收 ChuanPOS｜你的試用即將結束（剩 ${daysLeft} 天）<br><br>
    <strong>內容：</strong><br>
    Hi ${u.profile.brand_name}，<br><br>
    你的川收 ChuanPOS 試用即將於 <strong>${expiresStr}</strong> 結束（剩 ${daysLeft} 天）。<br><br>
    試用結束後帳號將自動凍結，你在試用期間建立的商品和訂單資料仍會保留。<br><br>
    如果試用滿意，歡迎 LINE 聯繫購買正式版：<br>
    → https://line.me<br><br>
    川收 ChuanPOS 團隊
  `;
  document.getElementById('modal-email').classList.add('show');
  document.body.style.overflow = 'hidden';
}

async function sendEmail() {
  if (!emailTarget) return;
  const btn = document.getElementById('btn-send-confirm');
  btn.disabled = true;
  btn.textContent = '發送中...';

  try {
    const daysLeft = getDaysLeft(emailTarget.trial.expires_at);
    const expiresStr = new Date(emailTarget.trial.expires_at).toLocaleDateString('zh-TW');

    // 呼叫 Resend API
    const res = await fetch('https://api.resend.com/emails', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${RESEND_API_KEY}`
      },
      body: JSON.stringify({
        from: `川收 ChuanPOS <${FROM_EMAIL}>`,
        to: [emailTarget.profile.email],
        subject: `川收 ChuanPOS｜你的試用即將結束（剩 ${daysLeft} 天）`,
        html: `
          <p>Hi ${emailTarget.profile.brand_name}，</p>
          <p>你的川收 ChuanPOS 試用即將於 <strong>${expiresStr}</strong> 結束（剩 <strong>${daysLeft} 天</strong>）。</p>
          <p>試用結束後帳號將自動凍結，你在試用期間建立的商品和訂單資料仍會保留。</p>
          <p>如果試用滿意，歡迎 LINE 聯繫購買正式版：<br>
          <a href="https://line.me">https://line.me</a></p>
          <p>川收 ChuanPOS 團隊</p>
        `
      })
    });

    if (res.ok) {
      // 記錄已寄送
      await sb.from('trials').update({ reminder_5d_sent: true }).eq('id', emailTarget.trial.id);
      closeEmailModal();
      await loadData();
      showToast('Email 已發送');
    } else {
      const err = await res.json();
      showToast('發送失敗：' + (err.message || '請確認網域設定'));
    }
  } catch(e) {
    showToast('發送失敗：' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '確認發送';
  }
}

function closeEmailModal() {
  document.getElementById('modal-email').classList.remove('show');
  document.body.style.overflow = '';
  emailTarget = null;
}

document.getElementById('modal-edit').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-edit')) closeModal();
});
document.getElementById('modal-email').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-email')) closeEmailModal();
});

async function unlockProfile(profileId, brandName, isCurrentlyUnlocked) {
  if (isCurrentlyUnlocked) {
    if (!confirm(`「${brandName}」目前解鎖中（7天內）。\n要重新計算7天（從今天起）嗎？`)) return;
  } else {
    if (!confirm(`確定解鎖「${brandName}」的基本資料修改權限？\n客戶將有 7 天內可自由修改。`)) return;
  }
  const { error } = await sb.from('profiles').update({
    profile_edit_unlocked_at: new Date().toISOString()
  }).eq('id', profileId);
  if (error) { showToast('❌ 解鎖失敗：' + error.message); return; }
  await loadData();
  showToast(`✅ 已解鎖「${brandName}」的資料修改權限（7天）`);
}

async function deleteAccount(profileId, email, brandName) {
  if (!confirm(`⚠️ 確定要永久刪除「${brandName}」的帳號嗎？\n\nEmail：${email}\n\n此操作無法復原，該帳號的所有資料（商品、訂單、試用紀錄）將一併刪除。`)) return;
  const second = prompt(`請再次輸入品牌名稱「${brandName}」確認刪除：`);
  if (second !== brandName) { showToast('品牌名稱不符，已取消'); return; }

  try {
    // 刪除 profiles（CASCADE 會自動刪除相關資料）
    const { error } = await sb.from('profiles').delete().eq('id', profileId);
    if (error) throw new Error(error.message);
    // Auth 用戶需到 Supabase 後台手動刪除，或用 Service Role Key
    showToast(`✅ 已刪除 ${brandName}。提醒：請到 Supabase Auth 手動刪除登入帳號。`);
    await loadData();
  } catch(e) {
    showToast('❌ 刪除失敗：' + e.message);
  }
}

async function logout() {
  await sb.auth.signOut();
  window.location.href = 'auth.html';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

init();
</script>
