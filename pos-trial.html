<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>川收 ChuanPOS｜試用系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Space+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --black: #0a0a0a;
  --white: #ffffff;
  --gray-50: #f8f8f6;
  --gray-100: #f0efec;
  --gray-200: #e2e0da;
  --gray-400: #9c9890;
  --gray-600: #5a5750;
  --accent: #c17f3e;
  --accent-light: #e8c99a;
  --green: #3d7a5c;
  --red: #c0392b;
  --nav-h: 52px;
  --cart-w: 340px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--gray-50); color: var(--black); }

/* ── TOP NAV ── */
#top-nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--nav-h);
  background: var(--black);
  display: flex; align-items: center;
  padding: 0 16px;
  gap: 12px;
}
.nav-logo-small { color: white; font-weight: 700; font-size: 15px; flex-shrink: 0; }
.nav-logo-small span { color: var(--accent-light); }
.order-type-tabs {
  display: flex; gap: 4px; flex: 1;
}
.order-type-btn {
  padding: 6px 14px;
  border-radius: 8px;
  border: 1.5px solid rgba(255,255,255,0.15);
  background: transparent;
  color: rgba(255,255,255,0.6);
  font-size: 13px; font-weight: 500;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer; transition: all 0.15s;
}
.order-type-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}
.nav-brand-name {
  font-size: 12px; color: rgba(255,255,255,0.4);
  flex-shrink: 0;
}
.nav-trial-badge {
  font-size: 11px;
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.5);
  padding: 3px 8px; border-radius: 100px;
  flex-shrink: 0;
}

/* ── LAYOUT ── */
#app {
  display: flex;
  height: 100vh;
  padding-top: var(--nav-h);
}

/* ── LEFT: PRODUCTS ── */
#products-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--gray-50);
}

/* 分類 tabs */
#category-tabs {
  display: flex;
  gap: 0;
  overflow-x: auto;
  background: var(--white);
  border-bottom: 1px solid var(--gray-200);
  padding: 0 12px;
  flex-shrink: 0;
  scrollbar-width: none;
}
#category-tabs::-webkit-scrollbar { display: none; }
.cat-tab {
  padding: 12px 16px;
  font-size: 13px; font-weight: 500;
  border: none; background: transparent;
  cursor: pointer; white-space: nowrap;
  color: var(--gray-600);
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  font-family: 'Noto Sans TC', sans-serif;
}
.cat-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* 商品格 */
#products-grid {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
  align-content: start;
}
.product-card {
  background: var(--white);
  border-radius: 14px;
  padding: 14px 12px;
  cursor: pointer;
  border: 1.5px solid var(--gray-200);
  transition: all 0.15s;
  display: flex; flex-direction: column;
}
.product-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(193,127,62,0.12); }
.product-card:active { transform: scale(0.97); }
.product-img {
  width: 100%; aspect-ratio: 1;
  object-fit: cover; border-radius: 8px;
  margin-bottom: 10px;
  background: var(--gray-100);
}
.product-img-placeholder {
  width: 100%; aspect-ratio: 1;
  border-radius: 8px;
  background: var(--gray-100);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; margin-bottom: 10px;
}
.product-name { font-size: 13px; font-weight: 500; margin-bottom: 4px; line-height: 1.3; }
.product-price { font-size: 14px; font-weight: 700; color: var(--accent); font-family: 'Space Mono', monospace; }
.product-unit { font-size: 11px; color: var(--gray-400); }

/* empty */
.empty-state {
  grid-column: 1/-1;
  text-align: center; padding: 60px 20px;
  color: var(--gray-400);
}
.empty-state .icon { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

/* ── RIGHT: CART ── */
#cart-panel {
  width: var(--cart-w);
  flex-shrink: 0;
  background: var(--white);
  border-left: 1px solid var(--gray-200);
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* 購物車標題 */
#cart-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--gray-100);
  display: flex; justify-content: space-between; align-items: center;
}
.cart-title { font-size: 14px; font-weight: 700; }
.cart-order-num { font-size: 12px; color: var(--gray-400); font-family: 'Space Mono', monospace; }
.btn-clear-cart {
  font-size: 12px; color: var(--gray-400);
  border: none; background: none; cursor: pointer;
  padding: 4px 8px; border-radius: 6px;
  transition: all 0.15s;
}
.btn-clear-cart:hover { background: var(--gray-100); color: var(--red); }

/* 備註欄 */
#cart-note-row {
  padding: 8px 16px;
  border-bottom: 1px solid var(--gray-100);
}
#cart-note {
  width: 100%; padding: 7px 10px;
  border: 1.5px solid var(--gray-200);
  border-radius: 8px; font-size: 12px;
  font-family: 'Noto Sans TC', sans-serif;
  resize: none; outline: none;
  color: var(--gray-600);
}
#cart-note:focus { border-color: var(--accent); }

/* 購物車清單 */
#cart-items {
  flex: 1; overflow-y: auto;
  padding: 8px 0;
}
.cart-empty {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; color: var(--gray-400);
  font-size: 13px; gap: 8px;
}
.cart-empty .icon { font-size: 32px; }

.cart-item {
  padding: 10px 16px;
  display: flex; align-items: flex-start;
  gap: 10px;
  border-bottom: 1px solid var(--gray-100);
  transition: background 0.1s;
}
.cart-item:hover { background: var(--gray-50); }
.cart-item-info { flex: 1; min-width: 0; }
.cart-item-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cart-item-variant { font-size: 11px; color: var(--gray-400); }
.cart-item-note-text { font-size: 11px; color: var(--accent); margin-top: 2px; }

/* 改價按鈕 */
.cart-item-price-btn {
  font-size: 13px; font-weight: 700;
  color: var(--accent); font-family: 'Space Mono', monospace;
  background: none; border: 1px dashed transparent;
  border-radius: 6px; padding: 2px 6px; cursor: pointer;
  transition: all 0.15s; white-space: nowrap;
}
.cart-item-price-btn:hover { border-color: var(--accent); background: #fdf6ed; }
.cart-item-original-price { font-size: 10px; color: var(--gray-400); text-decoration: line-through; font-family: 'Space Mono', monospace; }

.cart-qty-ctrl {
  display: flex; align-items: center; gap: 6px; flex-shrink: 0;
}
.qty-btn {
  width: 24px; height: 24px;
  border-radius: 6px; border: 1.5px solid var(--gray-200);
  background: none; cursor: pointer; font-size: 14px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; color: var(--gray-600);
}
.qty-btn:hover { border-color: var(--accent); color: var(--accent); }
.qty-btn.minus:hover { border-color: var(--red); color: var(--red); }
.qty-num { font-size: 13px; font-weight: 700; min-width: 16px; text-align: center; }

/* ── CART FOOTER ── */
#cart-footer {
  border-top: 1px solid var(--gray-200);
  padding: 12px 16px;
}

/* 折扣行 */
.discount-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
}
.btn-discount {
  flex: 1; padding: 8px 12px;
  border: 1.5px dashed var(--gray-200);
  border-radius: 8px; background: none;
  font-size: 12px; color: var(--gray-600);
  cursor: pointer; transition: all 0.15s;
  font-family: 'Noto Sans TC', sans-serif;
}
.btn-discount:hover { border-color: var(--accent); color: var(--accent); }
.btn-discount.active { border-color: var(--accent); background: #fdf6ed; color: var(--accent); font-weight: 700; }
.discount-clear {
  padding: 6px 10px; font-size: 12px; color: var(--red);
  border: none; background: none; cursor: pointer;
  border-radius: 6px; transition: background 0.15s;
}
.discount-clear:hover { background: #fdecea; }

/* 金額小計 */
.amount-rows { margin-bottom: 12px; }
.amount-row {
  display: flex; justify-content: space-between;
  font-size: 13px; color: var(--gray-600);
  padding: 3px 0;
}
.amount-row.discount { color: var(--red); }
.amount-row.total {
  font-size: 18px; font-weight: 700; color: var(--black);
  padding-top: 8px; border-top: 1px solid var(--gray-200); margin-top: 4px;
}
.amount-row.total span:last-child { font-family: 'Space Mono', monospace; }

/* 找零 */
.change-section {
  background: var(--gray-50);
  border-radius: 10px; padding: 10px 12px;
  margin-bottom: 12px;
}
.change-label { font-size: 12px; color: var(--gray-600); margin-bottom: 6px; }
.change-input-row { display: flex; gap: 8px; align-items: center; }
.change-input {
  flex: 1; padding: 8px 10px;
  border: 1.5px solid var(--gray-200);
  border-radius: 8px; font-size: 15px; font-weight: 700;
  font-family: 'Space Mono', monospace;
  outline: none; text-align: right;
}
.change-input:focus { border-color: var(--accent); }
.change-result {
  font-size: 13px; color: var(--green); font-weight: 700;
  font-family: 'Space Mono', monospace; min-width: 60px; text-align: right;
}
.change-result.negative { color: var(--red); }

/* 付款方式 */
.payment-row {
  display: flex; gap: 6px; flex-wrap: wrap;
  margin-bottom: 12px;
}
.payment-btn {
  padding: 6px 12px; border-radius: 8px;
  border: 1.5px solid var(--gray-200);
  background: none; font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 0.15s;
  font-family: 'Noto Sans TC', sans-serif;
  color: var(--gray-600);
}
.payment-btn.active { background: var(--black); border-color: var(--black); color: white; }

/* 結帳按鈕 */
.btn-checkout {
  width: 100%; padding: 14px;
  background: var(--green); color: white;
  border: none; border-radius: 12px;
  font-size: 16px; font-weight: 700;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer; transition: all 0.2s;
}
.btn-checkout:hover { background: #2d6347; transform: translateY(-1px); }
.btn-checkout:disabled { background: var(--gray-200); color: var(--gray-400); cursor: not-allowed; transform: none; }

/* ── BOTTOM NAV ── */
#bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  height: 56px;
  background: var(--white);
  border-top: 1px solid var(--gray-200);
  display: flex;
}
.bottom-nav-btn {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 2px; border: none; background: none;
  font-size: 10px; color: var(--gray-400);
  cursor: pointer; transition: color 0.15s;
  font-family: 'Noto Sans TC', sans-serif;
}
.bottom-nav-btn .icon { font-size: 20px; }
.bottom-nav-btn.active { color: var(--accent); }

/* ── MODALS ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.5); z-index: 200;
  align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: var(--white); border-radius: 20px;
  padding: 28px; width: 100%; max-width: 360px;
}
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.modal-input {
  width: 100%; padding: 12px 14px;
  border: 1.5px solid var(--gray-200); border-radius: 10px;
  font-size: 20px; font-weight: 700; font-family: 'Space Mono', monospace;
  outline: none; text-align: center; margin-bottom: 16px;
}
.modal-input:focus { border-color: var(--accent); }
.modal-btns { display: flex; gap: 10px; }
.modal-btn-cancel {
  flex: 1; padding: 11px; background: var(--gray-100);
  border: none; border-radius: 10px; font-size: 14px;
  font-family: 'Noto Sans TC', sans-serif; cursor: pointer;
}
.modal-btn-ok {
  flex: 2; padding: 11px; background: var(--black); color: white;
  border: none; border-radius: 10px; font-size: 14px; font-weight: 700;
  font-family: 'Noto Sans TC', sans-serif; cursor: pointer;
}

/* 規格選擇 modal */
.variant-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.variant-btn {
  padding: 12px 16px; border: 1.5px solid var(--gray-200);
  border-radius: 10px; background: none; cursor: pointer;
  display: flex; justify-content: space-between; align-items: center;
  font-size: 14px; font-family: 'Noto Sans TC', sans-serif;
  transition: all 0.15s;
}
.variant-btn:hover { border-color: var(--accent); background: #fdf6ed; }
.variant-price { font-family: 'Space Mono', monospace; font-weight: 700; color: var(--accent); }

/* 結帳成功 */
#success-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(10,10,10,0.85); z-index: 300;
  align-items: center; justify-content: center;
}
#success-overlay.show { display: flex; }
.success-box {
  background: white; border-radius: 24px;
  padding: 40px 32px; text-align: center; max-width: 320px;
}
.success-icon { font-size: 56px; margin-bottom: 16px; }
.success-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.success-total { font-size: 28px; font-weight: 700; color: var(--green); font-family: 'Space Mono', monospace; margin-bottom: 4px; }
.success-change { font-size: 14px; color: var(--gray-600); margin-bottom: 24px; }
.btn-next-order {
  width: 100%; padding: 13px; background: var(--black); color: white;
  border: none; border-radius: 12px; font-size: 15px; font-weight: 700;
  font-family: 'Noto Sans TC', sans-serif; cursor: pointer;
}

/* SPINNER */
.full-spinner {
  position: fixed; inset: 0; background: var(--gray-50);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px; z-index: 500;
}
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--gray-200);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* MOBILE */
@media (max-width: 700px) {
  :root { --cart-w: 100%; }
  #app { flex-direction: column; padding-bottom: 56px; }
  #products-panel { height: 50vh; }
  #cart-panel {
    position: fixed; bottom: 56px; left: 0; right: 0;
    height: 50vh; border-left: none; border-top: 1px solid var(--gray-200);
  }
}
</style>
</head>
<body>

<!-- 載入 -->
<div class="full-spinner" id="spinner">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--gray-400)">載入系統...</div>
</div>

<!-- TOP NAV -->
<div id="top-nav">
  <div class="nav-logo-small">川收 <span>Chuan</span>POS</div>
  <div class="order-type-tabs">
    <button class="order-type-btn active" onclick="setOrderType('dine_in',this)">內用</button>
    <button class="order-type-btn" onclick="setOrderType('takeout',this)">外帶</button>
    <button class="order-type-btn" onclick="setOrderType('product',this)">購買商品</button>
  </div>
  <div class="nav-brand-name" id="nav-brand-name"></div>
  <div class="nav-trial-badge" id="nav-days-left"></div>
</div>

<!-- MAIN APP -->
<div id="app">

  <!-- 左：商品 -->
  <div id="products-panel">
    <div id="category-tabs"></div>
    <div id="products-grid"></div>
  </div>

  <!-- 右：購物車 -->
  <div id="cart-panel">
    <div id="cart-header">
      <div>
        <div class="cart-title">購物車</div>
        <div class="cart-order-num" id="cart-order-num">#101</div>
      </div>
      <button class="btn-clear-cart" onclick="clearCart()">清空</button>
    </div>
    <div id="cart-note-row">
      <textarea id="cart-note" rows="1" placeholder="訂單備註（可不填）"></textarea>
    </div>
    <div id="cart-items">
      <div class="cart-empty">
        <div class="icon">🛒</div>
        <p>點選商品加入購物車</p>
      </div>
    </div>
    <div id="cart-footer">
      <!-- 折扣 -->
      <div class="discount-row">
        <button class="btn-discount" id="btn-discount" onclick="openDiscountModal()">＋ 輸入折扣金額</button>
        <button class="discount-clear" id="btn-discount-clear" style="display:none" onclick="clearDiscount()">✕</button>
      </div>
      <!-- 金額 -->
      <div class="amount-rows">
        <div class="amount-row"><span>小計</span><span id="amt-subtotal">$0</span></div>
        <div class="amount-row discount" id="amt-discount-row" style="display:none"><span id="amt-discount-label">折扣</span><span id="amt-discount">-$0</span></div>
        <div class="amount-row total"><span>總計</span><span id="amt-total">$0</span></div>
      </div>
      <!-- 找零 -->
      <div class="change-section">
        <div class="change-label">收款金額</div>
        <div class="change-input-row">
          <input class="change-input" id="received-input" type="number" placeholder="0" oninput="calcChange()">
          <div class="change-result" id="change-result">找零 $—</div>
        </div>
      </div>
      <!-- 付款方式 -->
      <div class="payment-row" id="payment-row"></div>
      <!-- 結帳 -->
      <button class="btn-checkout" id="btn-checkout" onclick="checkout()" disabled>結帳</button>
    </div>
  </div>

</div>

<!-- BOTTOM NAV -->
<div id="bottom-nav">
  <button class="bottom-nav-btn active" onclick="showTab('pos')"><span class="icon">🧾</span>點餐</button>
  <button class="bottom-nav-btn" onclick="showTab('orders')"><span class="icon">📋</span>訂單</button>
  <button class="bottom-nav-btn" onclick="showTab('stats')"><span class="icon">📊</span>統計</button>
  <button class="bottom-nav-btn" onclick="showTab('admin')"><span class="icon">⚙️</span>後台</button>
  <button class="bottom-nav-btn" onclick="goBack()"><span class="icon">🏠</span>返回</button>
</div>

<!-- 規格選擇 Modal -->
<div class="modal-overlay" id="modal-variant">
  <div class="modal-box">
    <div class="modal-title" id="variant-modal-title">選擇規格</div>
    <div class="variant-list" id="variant-list"></div>
    <button class="modal-btn-cancel" onclick="closeModal('modal-variant')">取消</button>
  </div>
</div>

<!-- 改價 Modal -->
<div class="modal-overlay" id="modal-price">
  <div class="modal-box">
    <div class="modal-title">修改售價</div>
    <div style="font-size:13px;color:var(--gray-400);margin-bottom:12px" id="price-modal-subtitle"></div>
    <input class="modal-input" id="price-input" type="number" placeholder="輸入新售價">
    <div class="modal-btns">
      <button class="modal-btn-cancel" onclick="closeModal('modal-price')">取消</button>
      <button class="modal-btn-ok" onclick="confirmPriceChange()">確認修改</button>
    </div>
  </div>
</div>

<!-- 折扣 Modal -->
<div class="modal-overlay" id="modal-discount">
  <div class="modal-box">
    <div class="modal-title">輸入折扣金額</div>
    <div style="font-size:13px;color:var(--gray-400);margin-bottom:12px">例如輸入 30，即折抵 $30</div>
    <input class="modal-input" id="discount-input" type="number" placeholder="0">
    <div class="modal-btns">
      <button class="modal-btn-cancel" onclick="closeModal('modal-discount')">取消</button>
      <button class="modal-btn-ok" onclick="confirmDiscount()">套用折扣</button>
    </div>
  </div>
</div>

<!-- 結帳成功 -->
<div id="success-overlay">
  <div class="success-box">
    <div class="success-icon">✅</div>
    <div class="success-title">結帳完成！</div>
    <div class="success-total" id="success-total"></div>
    <div class="success-change" id="success-change"></div>
    <button class="btn-next-order" onclick="nextOrder()">下一筆訂單</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://siiicdrjpuotapdtlqsu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNpaWljZHJqcHVvdGFwZHRscXN1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzODQ5MzUsImV4cCI6MjA4ODk2MDkzNX0.TiVezXuAKuJYja2PUwbo9SLcg-de7_2vrodMsDZhg_Q';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// ── STATE ──
let currentUser = null, currentProfile = null, currentTrial = null;
let categories = [], products = [], paymentMethods = [];
let currentCatId = 'all';
let orderType = 'dine_in';
let cart = []; // { id, product_id, name, variant_name, original_price, price, qty, note }
let discount = 0;
let orderNumber = 101;
let editingCartIdx = null;
const PLAN_LIMITS = { basic: 10, advanced: 20, premium: 999 };

// ── INIT ──
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'auth.html'; return; }
  currentUser = session.user;

  const [{ data: profile }, { data: trial }] = await Promise.all([
    sb.from('profiles').select('*').eq('id', currentUser.id).single(),
    sb.from('trials').select('*').eq('user_id', currentUser.id).single()
  ]);

  if (!profile || !trial || trial.is_frozen || new Date(trial.expires_at) < new Date()) {
    window.location.href = 'trial.html'; return;
  }

  currentProfile = profile;
  currentTrial = trial;

  document.getElementById('nav-brand-name').textContent = profile.brand_name;
  const daysLeft = Math.max(0, Math.ceil((new Date(trial.expires_at) - new Date()) / 86400000));
  document.getElementById('nav-days-left').textContent = `試用剩 ${daysLeft} 天`;

  await loadData();
  await loadOrderNumber();
  document.getElementById('spinner').style.display = 'none';
}

async function loadData() {
  const [{ data: cats }, { data: prods }, { data: payments }] = await Promise.all([
    sb.from('categories').select('*').eq('user_id', currentUser.id).order('sort_order'),
    sb.from('products').select('*, product_variants(*)').eq('user_id', currentUser.id).eq('is_available', true).order('sort_order'),
    sb.from('payment_methods').select('*').eq('user_id', currentUser.id).order('sort_order')
  ]);
  categories = cats || [];
  products = prods || [];
  paymentMethods = payments && payments.length > 0 ? payments : [
    { id: 'cash', name: '現金' }, { id: 'card', name: '刷卡' }, { id: 'linepay', name: 'LINE Pay' }
  ];
  renderCategories();
  renderProducts();
  renderPaymentMethods();
}

async function loadOrderNumber() {
  const { count } = await sb.from('orders').select('*', { count: 'exact', head: true }).eq('user_id', currentUser.id);
  orderNumber = 101 + (count || 0);
  document.getElementById('cart-order-num').textContent = `#${orderNumber}`;
}

// ── RENDER CATEGORIES ──
function renderCategories() {
  const tab = document.getElementById('category-tabs');
  tab.innerHTML = `<button class="cat-tab active" onclick="filterCat('all',this)">全部</button>`;
  categories.forEach(c => {
    tab.innerHTML += `<button class="cat-tab" onclick="filterCat('${c.id}',this)">${c.name}</button>`;
  });
}

function filterCat(id, btn) {
  currentCatId = id;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderProducts();
}

// ── RENDER PRODUCTS ──
function renderProducts() {
  const grid = document.getElementById('products-grid');
  const filtered = currentCatId === 'all' ? products : products.filter(p => p.category_id === currentCatId);
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state"><div class="icon">📦</div><p>這個分類還沒有商品<br>請先到後台新增商品</p></div>`;
    return;
  }
  grid.innerHTML = filtered.map(p => `
    <div class="product-card" onclick="addToCart('${p.id}')">
      ${p.image_url
        ? `<img class="product-img" src="${p.image_url}" alt="${p.name}">`
        : `<div class="product-img-placeholder">🛍</div>`}
      <div class="product-name">${p.name}</div>
      <div class="product-price">$${p.price}<span class="product-unit"> /${p.unit||'份'}</span></div>
    </div>
  `).join('');
}

// ── ADD TO CART ──
function addToCart(productId) {
  const p = products.find(x => x.id === productId);
  if (!p) return;
  if (p.product_variants && p.product_variants.length > 0) {
    openVariantModal(p); return;
  }
  pushCartItem(p, null, p.price);
}

function pushCartItem(p, variant, price) {
  const existing = cart.findIndex(c =>
    c.product_id === p.id &&
    c.variant_name === (variant ? variant.name : null) &&
    c.price === price
  );
  if (existing >= 0) { cart[existing].qty++; }
  else {
    cart.push({
      id: Date.now(),
      product_id: p.id,
      name: p.name,
      variant_name: variant ? variant.name : null,
      original_price: price,
      price: price,
      qty: 1,
      note: ''
    });
  }
  renderCart();
}

// ── VARIANT MODAL ──
function openVariantModal(p) {
  document.getElementById('variant-modal-title').textContent = p.name;
  const list = document.getElementById('variant-list');
  list.innerHTML = p.product_variants.map(v => `
    <button class="variant-btn" onclick="closeModal('modal-variant');pushCartItem(products.find(x=>x.id==='${p.id}'),{name:'${v.name}'},${p.price + (v.price_delta||0)})">
      <span>${v.name}</span>
      <span class="variant-price">$${p.price + (v.price_delta||0)}</span>
    </button>
  `).join('');
  document.getElementById('modal-variant').classList.add('show');
}

// ── RENDER CART ──
function renderCart() {
  const el = document.getElementById('cart-items');
  if (!cart.length) {
    el.innerHTML = `<div class="cart-empty"><div class="icon">🛒</div><p>點選商品加入購物車</p></div>`;
    updateAmounts();
    return;
  }
  el.innerHTML = cart.map((item, idx) => `
    <div class="cart-item">
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}${item.variant_name ? ` <span style="color:var(--gray-400);font-weight:400">(${item.variant_name})</span>` : ''}</div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:4px">
          <button class="cart-item-price-btn" onclick="openPriceModal(${idx})">$${item.price}</button>
          ${item.price !== item.original_price ? `<span class="cart-item-original-price">$${item.original_price}</span>` : ''}
        </div>
      </div>
      <div class="cart-qty-ctrl">
        <button class="qty-btn minus" onclick="changeQty(${idx},-1)">−</button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" onclick="changeQty(${idx},1)">+</button>
      </div>
    </div>
  `).join('');
  updateAmounts();
}

function changeQty(idx, delta) {
  cart[idx].qty += delta;
  if (cart[idx].qty <= 0) cart.splice(idx, 1);
  renderCart();
}

function clearCart() {
  cart = []; discount = 0;
  document.getElementById('received-input').value = '';
  document.getElementById('change-result').textContent = '找零 $—';
  document.getElementById('btn-discount').textContent = '＋ 輸入折扣金額';
  document.getElementById('btn-discount').classList.remove('active');
  document.getElementById('btn-discount-clear').style.display = 'none';
  document.getElementById('amt-discount-row').style.display = 'none';
  renderCart();
}

// ── AMOUNTS ──
function updateAmounts() {
  const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const total = Math.max(0, subtotal - discount);
  document.getElementById('amt-subtotal').textContent = `$${subtotal}`;
  document.getElementById('amt-total').textContent = `$${total}`;
  if (discount > 0) {
    document.getElementById('amt-discount-row').style.display = 'flex';
    document.getElementById('amt-discount').textContent = `-$${discount}`;
  }
  document.getElementById('btn-checkout').disabled = cart.length === 0;
  calcChange();
}

// ── 找零 ──
function calcChange() {
  const total = Math.max(0, cart.reduce((s,i) => s + i.price*i.qty, 0) - discount);
  const received = parseInt(document.getElementById('received-input').value) || 0;
  const el = document.getElementById('change-result');
  if (!received) { el.textContent = '找零 $—'; el.className = 'change-result'; return; }
  const change = received - total;
  el.textContent = change >= 0 ? `找零 $${change}` : `不足 $${Math.abs(change)}`;
  el.className = 'change-result' + (change < 0 ? ' negative' : '');
}

// ── 改價 Modal ──
function openPriceModal(idx) {
  editingCartIdx = idx;
  const item = cart[idx];
  document.getElementById('price-modal-subtitle').textContent = `${item.name} · 原價 $${item.original_price}`;
  document.getElementById('price-input').value = item.price;
  document.getElementById('modal-price').classList.add('show');
  setTimeout(() => document.getElementById('price-input').select(), 100);
}
function confirmPriceChange() {
  const val = parseInt(document.getElementById('price-input').value);
  if (isNaN(val) || val < 0) return;
  cart[editingCartIdx].price = val;
  closeModal('modal-price');
  renderCart();
}

// ── 折扣 Modal ──
function openDiscountModal() {
  document.getElementById('discount-input').value = discount || '';
  document.getElementById('modal-discount').classList.add('show');
  setTimeout(() => document.getElementById('discount-input').select(), 100);
}
function confirmDiscount() {
  const val = parseInt(document.getElementById('discount-input').value);
  if (!isNaN(val) && val > 0) {
    discount = val;
    document.getElementById('btn-discount').textContent = `折扣 -$${val}`;
    document.getElementById('btn-discount').classList.add('active');
    document.getElementById('btn-discount-clear').style.display = 'inline';
  }
  closeModal('modal-discount');
  updateAmounts();
}
function clearDiscount() {
  discount = 0;
  document.getElementById('btn-discount').textContent = '＋ 輸入折扣金額';
  document.getElementById('btn-discount').classList.remove('active');
  document.getElementById('btn-discount-clear').style.display = 'none';
  document.getElementById('amt-discount-row').style.display = 'none';
  updateAmounts();
}

// ── 付款方式 ──
let selectedPayment = null;
function renderPaymentMethods() {
  const row = document.getElementById('payment-row');
  row.innerHTML = paymentMethods.map((p,i) => `
    <button class="payment-btn${i===0?' active':''}" onclick="selectPayment('${p.id||p.name}',this)">${p.name}</button>
  `).join('');
  selectedPayment = paymentMethods[0]?.name || '現金';
}
function selectPayment(id, btn) {
  document.querySelectorAll('.payment-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const pm = paymentMethods.find(p => (p.id||p.name) === id);
  selectedPayment = pm ? pm.name : id;
}

// ── CHECKOUT ──
async function checkout() {
  if (!cart.length) return;
  const subtotal = cart.reduce((s,i) => s + i.price*i.qty, 0);
  const total = Math.max(0, subtotal - discount);
  const received = parseInt(document.getElementById('received-input').value) || 0;
  const change = received > 0 ? received - total : null;
  const note = document.getElementById('cart-note').value.trim();

  document.getElementById('btn-checkout').disabled = true;
  document.getElementById('btn-checkout').textContent = '處理中...';

  try {
    const { data: order, error: orderErr } = await sb.from('orders').insert({
      user_id: currentUser.id,
      order_number: orderNumber,
      order_type: orderType,
      payment_method: selectedPayment,
      subtotal,
      discount,
      total,
      received_amount: received || null,
      change_amount: change,
      note: note || null
    }).select().single();
    if (orderErr) throw orderErr;

    const items = cart.map(item => ({
      order_id: order.id,
      product_name: item.name,
      variant_name: item.variant_name,
      quantity: item.qty,
      unit_price: item.price,
      subtotal: item.price * item.qty,
      item_note: item.note || null
    }));
    await sb.from('order_items').insert(items);
    await sb.from('feature_logs').insert({ user_id: currentUser.id, feature: 'checkout' });

    // 顯示成功
    document.getElementById('success-total').textContent = `$${total}`;
    document.getElementById('success-change').textContent = change !== null && change >= 0 ? `找零 $${change}` : '';
    document.getElementById('success-overlay').classList.add('show');
    orderNumber++;

  } catch(e) {
    alert('結帳失敗：' + e.message);
    document.getElementById('btn-checkout').disabled = false;
    document.getElementById('btn-checkout').textContent = '結帳';
  }
}

function nextOrder() {
  document.getElementById('success-overlay').classList.remove('show');
  document.getElementById('cart-order-num').textContent = `#${orderNumber}`;
  document.getElementById('btn-checkout').textContent = '結帳';
  clearCart();
}

// ── ORDER TYPE ──
function setOrderType(type, btn) {
  orderType = type;
  document.querySelectorAll('.order-type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ── TABS ──
function showTab(tab) {
  document.querySelectorAll('.bottom-nav-btn').forEach((b,i) => {
    b.classList.toggle('active', ['pos','orders','stats','admin','back'][i] === tab);
  });
  if (tab === 'orders') { window.location.href = 'pos-orders.html'; }
  else if (tab === 'stats') { window.location.href = 'pos-stats.html'; }
  else if (tab === 'admin') { window.location.href = 'pos-admin.html'; }
}

function goBack() { window.location.href = 'trial.html'; }

// ── MODAL HELPERS ──
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('show'); });
});

// Enter 快捷
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('modal-price').classList.contains('show')) confirmPriceChange();
    else if (document.getElementById('modal-discount').classList.contains('show')) confirmDiscount();
  }
});

init();
</script>
</body>
</html>
