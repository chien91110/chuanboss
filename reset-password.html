<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>川收 ChuanPOS｜重設密碼</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root { --accent:#c17f3e; --black:#0a0a0a; --white:#fff; --gray-50:#f8f8f6; --gray-100:#f0efec; --gray-200:#e2e0da; --gray-400:#9c9890; --gray-600:#5a5750; --green:#3d7a5c; --red:#c0392b; }
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Noto Sans TC',sans-serif; background:var(--gray-50); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
.card { background:var(--white); border-radius:24px; padding:40px 36px; max-width:400px; width:100%; box-shadow:0 8px 40px rgba(0,0,0,0.08); }
.icon { font-size:48px; text-align:center; margin-bottom:16px; }
.title { font-family:'DM Serif Display',serif; font-size:26px; text-align:center; margin-bottom:8px; }
.desc { font-size:13px; color:var(--gray-400); text-align:center; margin-bottom:28px; line-height:1.6; }
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:12px; font-weight:700; color:var(--gray-600); margin-bottom:6px; }
.input-wrap { position:relative; }
.form-input { width:100%; padding:11px 40px 11px 14px; border:1.5px solid var(--gray-200); border-radius:10px; font-size:14px; font-family:'Noto Sans TC',sans-serif; outline:none; transition:border-color 0.15s; }
.form-input:focus { border-color:var(--accent); }
.eye-btn { position:absolute; right:10px; top:50%; transform:translateY(-50%); border:none; background:none; cursor:pointer; padding:4px; color:var(--gray-400); font-size:16px; }
.btn-submit { width:100%; padding:13px; background:var(--accent); color:white; border:none; border-radius:12px; font-size:15px; font-weight:700; font-family:'Noto Sans TC',sans-serif; cursor:pointer; transition:all 0.15s; margin-top:8px; }
.btn-submit:hover { background:#a06530; }
.btn-submit:disabled { background:var(--gray-200); color:var(--gray-400); cursor:not-allowed; }
.alert { padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:16px; display:none; }
.alert.error { background:#fdecea; color:var(--red); border:1px solid #f5c6cb; }
.alert.success { background:#e8f5ee; color:var(--green); border:1px solid #c3e6cb; }
.rule { font-size:12px; color:var(--gray-400); margin-bottom:4px; display:flex; align-items:center; gap:6px; }
.rule.pass { color:var(--green); }
.rule::before { content:'○'; }
.rule.pass::before { content:'✓'; }
</style>
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#c17f3e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ChuanPOS">
</head>
<body>

<div class="card" id="card-reset">
  <div class="icon">🔑</div>
  <h1 class="title">設定新密碼</h1>
  <p class="desc">請輸入你的新密碼，設定完成後將自動登入。</p>

  <div class="alert" id="alert"></div>

  <div class="form-group">
    <label>新密碼</label>
    <div class="input-wrap">
      <input type="password" class="form-input" id="new-password"
        placeholder="至少 8 個字元" oninput="checkRules()">
      <button type="button" class="eye-btn" onclick="togglePw('new-password','eye1')">
        <span id="eye1">👁</span>
      </button>
    </div>
    <!-- 密碼規則提示 -->
    <div style="margin-top:8px">
      <div class="rule" id="rule-len">至少 8 個字元</div>
      <div class="rule" id="rule-mix">包含英文字母</div>
    </div>
  </div>

  <div class="form-group">
    <label>確認新密碼</label>
    <div class="input-wrap">
      <input type="password" class="form-input" id="confirm-password"
        placeholder="再輸入一次" oninput="checkRules()">
      <button type="button" class="eye-btn" onclick="togglePw('confirm-password','eye2')">
        <span id="eye2">👁</span>
      </button>
    </div>
    <div class="rule" id="rule-match" style="margin-top:8px">兩次密碼相符</div>
  </div>

  <button class="btn-submit" id="btn-reset" onclick="resetPassword()" disabled>確認設定新密碼</button>
</div>

<!-- 成功畫面 -->
<div class="card" id="card-success" style="display:none;text-align:center">
  <div class="icon">✅</div>
  <h1 class="title">密碼已更新</h1>
  <p class="desc" style="margin-bottom:24px">你的密碼已成功設定。<br>即將跳轉到系統...</p>
  <div style="width:100%;height:4px;background:var(--gray-100);border-radius:100px;overflow:hidden">
    <div id="redirect-bar" style="height:100%;background:var(--accent);border-radius:100px;width:0%;transition:width 3s linear"></div>
  </div>
</div>

<!-- 連結無效畫面 -->
<div class="card" id="card-invalid" style="display:none;text-align:center">
  <div class="icon">⚠️</div>
  <h1 class="title">連結已失效</h1>
  <p class="desc" style="margin-bottom:24px">此重設密碼連結已過期或無效。<br>請重新申請忘記密碼。</p>
  <a href="auth.html"
    style="display:block;padding:13px;background:var(--accent);color:white;border-radius:12px;font-size:15px;font-weight:700;text-decoration:none;text-align:center">
    回到登入頁
  </a>
</div>

<script>
const SUPABASE_URL = 'https://siiicdrjpuotapdtlqsu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNpaWljZHJqcHVvdGFwZHRscXN1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzODQ5MzUsImV4cCI6MjA4ODk2MDkzNX0.TiVezXuAKuJYja2PUwbo9SLcg-de7_2vrodMsDZhg_Q';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// 檢查是否有有效的 reset session
async function init() {
  // Supabase 重設連結會在 URL hash 帶 access_token
  const { data: { session }, error } = await sb.auth.getSession();

  // 如果沒有 session 或不是從重設連結來的
  if (!session) {
    // 檢查 URL hash（Supabase 有時用 hash 傳 token）
    const hash = window.location.hash;
    if (!hash.includes('access_token') && !hash.includes('type=recovery')) {
      document.getElementById('card-reset').style.display = 'none';
      document.getElementById('card-invalid').style.display = 'block';
    }
  }
}

function togglePw(inputId, eyeId) {
  const input = document.getElementById(inputId);
  const eye = document.getElementById(eyeId);
  input.type = input.type === 'password' ? 'text' : 'password';
  eye.textContent = input.type === 'password' ? '👁' : '🙈';
}

function checkRules() {
  const pw = document.getElementById('new-password').value;
  const pw2 = document.getElementById('confirm-password').value;

  const lenOk = pw.length >= 8;
  const mixOk = /[a-zA-Z]/.test(pw);
  const matchOk = pw === pw2 && pw.length > 0;

  document.getElementById('rule-len').className = 'rule' + (lenOk ? ' pass' : '');
  document.getElementById('rule-mix').className = 'rule' + (mixOk ? ' pass' : '');
  document.getElementById('rule-match').className = 'rule' + (matchOk ? ' pass' : '');

  document.getElementById('btn-reset').disabled = !(lenOk && mixOk && matchOk);
}

async function resetPassword() {
  const pw = document.getElementById('new-password').value;
  const btn = document.getElementById('btn-reset');
  btn.disabled = true; btn.textContent = '設定中...';

  const { error } = await sb.auth.updateUser({ password: pw });

  if (error) {
    const alert = document.getElementById('alert');
    alert.textContent = '設定失敗：' + error.message;
    alert.className = 'alert error';
    alert.style.display = 'block';
    btn.disabled = false; btn.textContent = '確認設定新密碼';
    return;
  }

  // 成功：顯示成功畫面，3秒後跳轉
  document.getElementById('card-reset').style.display = 'none';
  document.getElementById('card-success').style.display = 'block';
  requestAnimationFrame(() => {
    document.getElementById('redirect-bar').style.width = '100%';
  });
  setTimeout(() => { window.location.href = 'trial.html'; }, 3000);
}

// Enter 送出
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !document.getElementById('btn-reset').disabled) {
    resetPassword();
  }
});

init();
</script>

  <!-- PWA Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
</body>
</html>
